name: Stock Reports

on:
  workflow_dispatch:
    inputs:
      session:
        description: 'セッション'
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      session:
        description: 'セッション'
        required: false
        type: string
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install psycopg2-binary requests

      - name: Generate stock reports
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SESSION: ${{ inputs.session }}
        run: python scripts/github-actions/generate_stock_reports.py
