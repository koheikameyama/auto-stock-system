name: "[Scheduled] Morning Analysis Watchdog"

on:
  schedule:
    # 9:30 JST = 0:30 UTC (Mon-Fri JST)
    - cron: "30 0 * * 1-5"
    # 13:00 JST = 4:00 UTC (Mon-Fri JST)
    - cron: "0 4 * * 1-5"
  workflow_dispatch:

concurrency:
  group: morning-analysis-watchdog
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Check morning-analysis status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/check_morning_analysis_status.py
