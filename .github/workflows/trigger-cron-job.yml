name: Trigger Cron Job

on:
  workflow_dispatch:
    inputs:
      job:
        description: "実行するジョブ"
        type: choice
        required: true
        options:
          - order-manager
          - midday-reassessment
          - end-of-day
          - daily-backtest
          - jpx-delisting-sync
      skip_checks:
        description: "市場日・システム停止チェックをスキップ"
        type: boolean
        default: false

env:
  APP_URL: ${{ secrets.APP_URL }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Trigger job
        run: |
          JOB="${{ github.event.inputs.job }}"
          SKIP="${{ github.event.inputs.skip_checks }}"
          QUERY=""
          if [ "$SKIP" = "true" ]; then
            QUERY="?skip_checks=true"
          fi

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$APP_URL/api/cron/${JOB}${QUERY}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Job failed with HTTP $HTTP_CODE"
            exit 1
          fi

  notify-success:
    needs: trigger
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on success
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "✅ ${{ github.event.inputs.job }} 手動実行完了"
          SLACK_MESSAGE: "${{ github.event.inputs.job }} が正常に完了しました"
          SLACK_COLOR: good
          SLACK_FOOTER: "Stock Buddy"

  notify-failure:
    needs: trigger
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TITLE: "❌ ${{ github.event.inputs.job }} 手動実行失敗"
          SLACK_MESSAGE: |
            ${{ github.event.inputs.job }} が失敗しました
            詳細はGitHub Actionsログを確認してください
          SLACK_COLOR: danger
          SLACK_FOOTER: "Stock Buddy"
